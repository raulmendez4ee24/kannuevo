    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Que incluye el precio mensual?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Incluye la operacion del sistema, monitoreo, soporte y el alcance definido del plan. La promesa comercial es precio fijo, sin sorpresas ni cobros escondidos por uso."
            }
          },
          {
            "@type": "Question",
            "name": "Necesito tener sistemas o CRM para empezar?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No. Podemos arrancar con WhatsApp y procesos simples, o integrarnos con lo que ya uses. Si no existe API, tambien podemos operar via navegador o flujos alternos."
            }
          },
          {
            "@type": "Question",
            "name": "Esto reemplaza a mi equipo?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "No necesariamente. El objetivo es quitar trabajo repetitivo, tiempos muertos y tareas operativas para que tu equipo se enfoque en cierre, supervision y servicio."
            }
          },
          {
            "@type": "Question",
            "name": "Cuanto tardan en activarlo?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Los casos express pueden activarse en dias. Los proyectos mas complejos requieren auditoria, roadmap e implementacion por fases segun integraciones y procesos."
            }
          },
          {
            "@type": "Question",
            "name": "Se cobra antes o despues de la auditoria?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Primero revisamos el caso, el proceso y el alcance. La auditoria va antes del cobro para evitar venderte un plan que no corresponde y para definir bien implementacion, tiempos y precio."
            }
          },
          {
            "@type": "Question",
            "name": "Que pasa si algo falla?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Hay monitoreo, alertas y trazabilidad. En planes altos agregamos politicas, auditoria, SLA y capacidades de auto-reparacion para mantener continuidad operativa."
            }
          },
          {
            "@type": "Question",
            "name": "Como se si esto me conviene?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Si hoy pierdes prospectos por no responder, si haces seguimiento manual, si tu equipo repite tareas todos los dias o si no tienes visibilidad clara de la operacion, ya hay ROI potencial."
            }
          }
        ]
      }
